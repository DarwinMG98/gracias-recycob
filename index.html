<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gracias Recycob</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #020617, #000000);
  overflow: hidden;
  font-family: 'Courier New', monospace;
  color: #00ffc3;
}

/* MATRIX FONDO */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* TARJETA */
.card {
  position: relative;
  z-index: 2;
  max-width: 520px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.75);
  padding: 45px;
  border-radius: 18px;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,255,195,0.15);
  box-shadow: 0 0 40px rgba(0,255,195,0.15);
  animation: fadeIn 1.5s ease;
}

h1 {
  color: #00ffc3;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(0,255,195,0.6);
  font-size: 26px;
}

p {
  color: #a7f3d0;
  line-height: 1.7;
  font-size: 15px;
  min-height: 140px;
}

/* EFECTO CURSOR */
#typing::after {
  content: "|";
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

.firma {
  margin-top: 30px;
  font-weight: bold;
  letter-spacing: 1px;
  color: #00ffc3;
  text-shadow: 0 0 10px rgba(0,255,195,0.6);
}

/* BOTÓN */
.start {
  position: absolute;
  z-index: 3;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 16px 28px;
  border-radius: 10px;
  border: 1px solid rgba(0,255,195,0.4);
  color: #00ffc3;
  cursor: pointer;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.start:hover {
  box-shadow: 0 0 15px rgba(0,255,195,0.6);
  transform: translate(-50%, -50%) scale(1.05);
}

/* ANIMACIÓN */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(80px);
  }
  to {
    opacity: 1;
    transform: translateY(-50%);
  }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="start" onclick="startExperience()">
  ▶ Iniciar experiencia
</div>

<div class="card" id="card" style="display:none;">
  <h1>Gracias Recycob 💻</h1>
  <p id="typing"></p>
  <div class="firma">— Darwin Guachamin</div>
</div>

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01<>/{}[]$#";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) {
  drops[x] = 1;
}

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ffc3";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

// TEXTO
const text = `Gracias por abrirme las puertas y permitirme ser parte de este proceso 🙌

Me llevo aprendizaje, experiencia y grandes recuerdos de cada uno de ustedes 🚀

Esto no es un adiós, es un "nos vemos en producción" 😄`;

let index = 0;
const speed = 30;

function typeWriter() {
  if (index < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(index);
    index++;
    setTimeout(typeWriter, speed);
  }
}

function startExperience() {
  document.querySelector(".start").style.display = "none";
  document.getElementById("card").style.display = "block";
  typeWriter();
}
</script>

</body>
</html>
